<!DOCTYPE html>
<html lang="ko">

<head>

    <meta charset="UTF-8">

    <title>SellerOS</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

    <h1>✔ 분석 완료</h1>

    <p class="subtitle">
        주문 검수가 정상적으로 완료되었습니다.
    </p>

    <div class="card">

        <h3>📊 분석 결과</h3>

        <p class="result">

        📦 총 주문

        <span>{{ total }}건</span>
    
    </p>

        <p class="result success">
            🟢 입금완료
            <span>{{ matched }}건</span>
        </p>

        <p class="result danger">
            🔴 미입금
            <span>{{ unmatched }}건</span>
        </p>

        <p class="result warning">
            🟡 주문서없음
            <span>{{ no_order }}건</span>
        </p>

    </div>

    <div class="card">

        <h3>📥 결과 다운로드</h3>

        <a href="/download/result">
            <button class="download-btn">
                검수결과 다운로드
            </button>
        </a>

        <br><br>

        <a href="/download/logen">
            <button class="download-btn blue">
                로젠택배 다운로드
            </button>
        </a>

    </div>

    <a href="/">
        <button class="home-btn">
            처음으로
        </button>
    </a>

    <p class="version">
        SellerOS Web v0.1.0
    </p>

</div>

</body>

</html>
